<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>莫道后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- ── 登录 ── -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <span class="login-logo-emoji">☸</span>
      <span class="login-title">莫道后台</span>
    </div>
    <h2 class="login-heading">管理员登录</h2>
    <p class="login-sub">内容管理 · 一键上线</p>
    <div class="form-group">
      <label>邮箱</label>
      <input id="email" type="email" placeholder="admin@example.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="login-btn" class="btn-primary btn-full">登录</button>
    <button id="settings-btn-login" class="btn-ghost btn-full mt-8">⚙ 配置 Supabase</button>
    <p id="login-error" class="error-msg hidden"></p>
  </div>
</div>

<!-- ── 主应用 ── -->
<div id="app-shell" class="app-shell hidden">

  <!-- 侧栏 -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="sidebar-logo-emoji">☸</span>
      <span class="sidebar-title">莫道后台</span>
    </div>
    <div class="user-pill">
      <span class="user-avatar" id="user-avatar">A</span>
      <div class="user-info">
        <p class="user-name" id="user-name">管理员</p>
        <span class="badge" id="user-role-badge">owner</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="hub">
        <span class="nav-icon">📋</span><span>内容管理</span>
      </button>
      <button class="nav-btn" data-view="publisher">
        <span class="nav-icon">✏️</span><span>发布内容</span>
      </button>
      <button class="nav-btn" data-view="users">
        <span class="nav-icon">👥</span><span>用户管理</span>
      </button>
    </nav>
    <div class="sidebar-bottom">
      <button id="settings-btn" class="nav-btn">
        <span class="nav-icon">⚙</span><span>设置</span>
      </button>
      <button id="logout-btn" class="nav-btn danger">
        <span class="nav-icon">⏻</span><span>退出</span>
      </button>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="main">

    <!-- ── 内容管理 Hub ── -->
    <div id="view-hub" class="view">
      <div class="view-topbar">
        <div class="topbar-left">
          <h1>内容管理</h1>
          <div class="type-filter-pills" id="filter-pills">
            <button class="pill active" data-type="all">全部</button>
            <button class="pill" data-type="site">🕍 朝圣地点</button>
            <button class="pill" data-type="restaurant">🍜 素食餐厅</button>
            <button class="pill" data-type="recipe">🥗 素食菜谱</button>
            <button class="pill" data-type="sutra">📚 佛学书库</button>
            <button class="pill" data-type="article">📖 文章攻略</button>
            <button class="pill" data-type="forum">🗣 论坛帖子</button>
          </div>
        </div>
        <div class="topbar-right">
          <input id="hub-search" class="search-input" placeholder="🔍 搜索内容…">
          <button id="hub-new-btn" class="btn-primary">＋ 发布内容</button>
          <button id="reload-btn" class="btn-ghost btn-sm">↻ 刷新</button>
          <button id="seed-btn" class="btn-ghost btn-sm" title="将前端现有数据一键导入后台">📥 导入初始数据</button>
          <button id="seed-library-btn" class="btn-ghost btn-sm" title="单独导入/覆盖书库数据">📚 导入书库</button>
        </div>
      </div>
      <div id="content-grid" class="content-grid"></div>
    </div>

    <!-- ── 发布/编辑内容 Publisher ── -->
    <div id="view-publisher" class="view hidden">
      <div class="publisher-topbar">
        <button id="publisher-back" class="btn-ghost btn-sm">← 返回</button>
        <h2 id="publisher-title">发布新内容</h2>
        <div class="publisher-actions">
          <button id="draft-btn" class="btn-ghost">存草稿</button>
          <button id="publish-btn" class="btn-success">🚀 发布上线</button>
        </div>
      </div>

      <!-- 类型选择（新建时显示） -->
      <div id="type-selector" class="type-selector">
        <p class="type-selector-label">选择内容类型：</p>
        <div class="type-pills">
          <button class="type-pill active" data-type="site">🕍<br>朝圣地点</button>
          <button class="type-pill" data-type="restaurant">🍜<br>素食餐厅</button>
          <button class="type-pill" data-type="recipe">🥗<br>素食菜谱</button>
          <button class="type-pill" data-type="sutra">📚<br>佛学书库</button>
          <button class="type-pill" data-type="article">📖<br>文章攻略</button>
          <button class="type-pill" data-type="forum">🗣<br>论坛帖子</button>
        </div>
      </div>

      <!-- 左右分栏 -->
      <div class="publisher-split">

        <!-- 左：预览卡片 + 图片上传 -->
        <div class="preview-col">
          <p class="col-label">封面预览</p>
          <div class="preview-card" id="preview-card">
            <div class="preview-cover-wrap" id="preview-cover-wrap">
              <img id="preview-cover-img" class="preview-cover-img hidden" alt="">
              <div class="preview-cover-empty" id="preview-cover-empty">
                <div class="upload-icon">🖼</div>
                <p>点击或拖入图片<br>自动上传</p>
              </div>
              <div class="upload-overlay hidden" id="upload-overlay">
                <div class="upload-spinner"></div>
                <p>上传中…</p>
              </div>
            </div>
            <div class="preview-body">
              <div id="preview-tags-row" class="preview-tags-row"></div>
              <div id="preview-name" class="preview-name">标题将显示在这里</div>
              <div id="preview-desc-text" class="preview-desc-text">简介将显示在这里</div>
              <div id="preview-meta" class="preview-meta"></div>
            </div>
          </div>
          <p class="upload-hint">点击封面区域或拖入图片，自动上传并填入</p>
          <input id="cover-file-input" type="file" accept="image/*,video/*" class="hidden">

          <!-- 图片URL直接粘贴（备用） -->
          <div class="form-group mt-16">
            <label>或直接粘贴封面图片 URL</label>
            <div style="display:flex;gap:8px">
              <input id="f-cover-url" placeholder="https://images.unsplash.com/…">
              <button id="cover-url-apply" class="btn-ghost btn-sm">应用</button>
            </div>
          </div>
        </div>

        <!-- 右：表单 -->
        <div class="form-col">
          <!-- 基础字段 -->
          <div class="form-section">
            <div class="form-group">
              <label>标题 <span class="required">*</span></label>
              <input id="f-title" placeholder="请输入标题">
            </div>
            <div class="form-group" id="f-region-group">
              <label>地区</label>
              <input id="f-region" placeholder="例：西藏 · 拉萨">
            </div>
            <div class="form-group">
              <label>简介</label>
              <textarea id="f-desc" rows="3" placeholder="一两句话描述，显示在卡片上…"></textarea>
            </div>
            <div class="form-group">
              <label>标签 <span class="field-hint">（回车添加，点击删除）</span></label>
              <div class="tag-input-wrap" id="tag-input-wrap">
                <div id="tag-chips" class="tag-chips"></div>
                <input id="tag-input" placeholder="输入标签后按回车…">
              </div>
            </div>
          </div>

          <!-- 类型专属字段（JS渲染） -->
          <div id="type-fields"></div>

          <!-- 地图坐标（朝圣/餐厅才显示） -->
          <div id="coord-section" class="form-section hidden">
            <div class="section-title">📍 地图位置选取</div>
            <p class="field-hint">点击地图定位，或手动填写坐标。添加后地图上会自动出现该位置。</p>
            <div class="coord-picker" id="coord-picker">
              <div class="coord-label coord-nw">西北</div>
              <div class="coord-label coord-ne">东北</div>
              <div class="coord-label coord-sw">西南</div>
              <div class="coord-label coord-se">东南</div>
              <div class="coord-label coord-c">中部</div>
              <div class="coord-dot hidden" id="coord-dot"></div>
              <div id="coord-ref-dots"></div>
            </div>
            <div class="form-row-2 mt-8">
              <div class="form-group">
                <label>X（西←→东，0–700）</label>
                <input id="f-coord-x" type="number" min="0" max="700" placeholder="180">
              </div>
              <div class="form-group">
                <label>Y（北↑↓南，0–480）</label>
                <input id="f-coord-y" type="number" min="0" max="480" placeholder="210">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 用户管理 ── -->
    <div id="view-users" class="view hidden">
      <div class="view-topbar">
        <div class="topbar-left"><h1>用户管理</h1></div>
        <div class="topbar-right">
          <input id="user-search" class="search-input" placeholder="🔍 搜索邮箱/名称…">
        </div>
      </div>
      <div id="user-list" class="user-list"></div>
    </div>

  </main>
</div>

<!-- ── Toast ── -->
<div id="toast" class="toast"></div>

<!-- ── Supabase 设置 ── -->
<div id="settings-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3>⚙ Supabase 连接配置</h3>
      <button class="icon-btn" onclick="closeModal('settings-modal')">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-desc">配置保存在浏览器本地，不会上传服务器。</p>
      <div class="form-group">
        <label>SUPABASE_URL</label>
        <input id="settings-url" type="url" placeholder="https://xxx.supabase.co">
      </div>
      <div class="form-group">
        <label>SUPABASE_ANON_KEY</label>
        <input id="settings-anon-key" type="password" placeholder="eyJ…">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('settings-modal')">取消</button>
      <button id="save-settings-btn" class="btn-primary">保存</button>
    </div>
  </div>
</div>

<!-- ── 通用确认 ── -->
<div id="confirm-modal" class="modal-overlay hidden">
  <div class="modal modal-sm">
    <div class="modal-header"><h3 id="confirm-title">确认操作</h3></div>
    <div class="modal-body"><p id="confirm-message"></p></div>
    <div class="modal-footer">
      <button id="confirm-cancel" class="btn-ghost">取消</button>
      <button id="confirm-ok" class="btn-danger">确认</button>
    </div>
  </div>
</div>

<!-- ── 用户编辑 ── -->
<div id="user-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3>编辑用户</h3>
      <button class="icon-btn" onclick="closeModal('user-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>邮箱</label>
        <input id="u-email" readonly class="input-readonly">
      </div>
      <div class="form-group">
        <label>显示名称</label>
        <input id="u-name" placeholder="用户显示名">
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="u-role">
          <option value="viewer">viewer — 只读</option>
          <option value="editor">editor — 可编辑</option>
          <option value="owner">owner — 超级管理员</option>
        </select>
      </div>
      <div class="form-group">
        <label>状态</label>
        <select id="u-status">
          <option value="active">active — 正常</option>
          <option value="disabled">disabled — 已禁用</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('user-modal')">取消</button>
      <button id="u-save-btn" class="btn-primary">保存</button>
    </div>
  </div>
</div>

<script type="module" src="./admin.js"></script>
</body>
</html>
