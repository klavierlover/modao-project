<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>莫道后台管理</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>莫道后台</h1>
        <button id="toggle-sidebar-btn" class="ghost icon-btn" title="折叠侧栏">≡</button>
      </div>
      <p class="hint">内容先保存为草稿，点击“上线当前模块”后前台生效。</p>
      <div class="auth-box">
        <input id="email" placeholder="管理员邮箱">
        <input id="password" placeholder="密码" type="password">
        <button id="login-btn">登录</button>
        <button id="logout-btn" class="ghost">退出</button>
      </div>
      <p id="auth-status">未登录</p>
      <hr>
      <nav id="module-nav"></nav>
      <button id="publish-btn" class="publish-btn">上线当前模块</button>
    </aside>
    <main class="main">
      <section class="topbar">
        <div>
          <h2 id="active-module-title">当前模块：首页</h2>
          <p id="active-module-desc">可编辑模块 JSON、文章列表、图片与用户配置。</p>
        </div>
        <div class="actions">
          <button id="reload-all-btn" class="ghost">刷新当前模块</button>
        </div>
      </section>
      <section class="panel">
        <h2>模块草稿内容</h2>
        <textarea id="module-json" rows="14"></textarea>
        <div class="row">
          <button id="save-module-btn">保存模块草稿</button>
        </div>
      </section>
      <section class="panel">
        <h2>文章管理</h2>
        <input id="article-search" placeholder="搜索文章标题或 slug">
        <div class="row">
          <input id="article-slug" placeholder="slug">
          <input id="article-title" placeholder="标题">
        </div>
        <div class="row">
          <input id="article-url" placeholder="文章链接（可选）">
          <input id="article-cover" placeholder="封面 URL（可选）">
        </div>
        <textarea id="article-summary" rows="3" placeholder="摘要"></textarea>
        <textarea id="article-md" rows="8" placeholder="正文 Markdown（可选）"></textarea>
        <div class="row">
          <button id="upsert-article-btn">新增/更新文章</button>
          <button id="clear-article-btn" class="ghost">清空表单</button>
        </div>
        <div class="row">
          <button id="delete-article-btn" class="danger">删除当前 slug 文章</button>
        </div>
        <div id="article-list" class="list"></div>
      </section>
      <section class="panel">
        <h2>图片上传（替换图片）</h2>
        <input id="file-input" type="file" accept="image/*">
        <div class="row">
          <button id="upload-btn">上传到媒体库</button>
        </div>
        <input id="upload-result" readonly placeholder="上传后 URL 将显示在这里">
      </section>
      <section class="panel">
        <h2>用户管理</h2>
        <input id="user-search" placeholder="搜索用户（邮箱/显示名/角色）">
        <div class="row">
          <input id="user-id" placeholder="用户ID">
          <input id="user-display-name" placeholder="显示名">
        </div>
        <div class="row">
          <input id="user-role" placeholder="角色 owner/editor/viewer">
          <input id="user-status" placeholder="状态 active/disabled">
        </div>
        <div class="row">
          <button id="update-user-btn">更新用户</button>
          <button id="reload-users-btn" class="ghost">刷新用户列表</button>
        </div>
        <div id="user-list" class="list"></div>
      </section>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script type="module" src="./admin.js"></script>
</body>
</html>
